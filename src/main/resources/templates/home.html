<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<link th:href="@{/css/content.css}" rel = "stylesheet">
<meta charset="UTF-8">
<title>備品管理</title>
</head>
<body>
	
	<div class="page">
	<div class="container">
	<form action="/home" method="post">
		
		<h1>備品管理</h1>
		
		<!--備品入力欄-->
		<div class="area">
		<input 	type="text" class = "form" name="name" placeholder="備品名を入力してください" required>
		
		<!--登録・貸出・返却・削除ボタン-->
		
		<button type="submit" class="button" name="action" value="register" >登録</button>
		<button type="submit" class="button" name="action" value="rental" >貸出</button>
		<button type="submit" class="button" name="action" value="bihinReturn" >返却</button>
		<button type="submit" class="button" name="action" value="delete" >削除</button>
		</div><br>
		
		<!--メッセージ表示-->
		<p class="result-area" th:if="${message != null}"
							   th:text="${message}"></p>
		
		<h3>備品一覧</h3>
		
		<div class="header">
		<span class="id">id</span>
		<span class="name">名称</span>
		<span class="rental">状態</span>
		<span class="num">使用回数</span>
		</div>
		
		<div class="row" th:each="list : ${datalist}">
			<span class="id" th:text="${list.id}"></span>
		    <span class="name" th:text="${list.name}"></span>
			<span class="rental" th:text="${list.rental} ? '貸出可能' : '貸出中'"></span>
			<span class="num" th:text="${list.num + '回'}"></span>
		</div>
	</form>
	</div>
	</div>
</body>
</html>
